<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spot the Difference</title>
    <style>
        :root {
            --accent-green: #67a716;
            --accent-red: #ff3e30;
            --star-color: #fbc531;
            --penalty-yellow: rgba(255, 223, 0, 0.9);
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: radial-gradient(circle, #1a1a2e 0%, #0a0a12 100%);
            color: white; font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden; touch-action: manipulation;
        }

        #header {
            width: 100%; max-width: 600px; padding: 15px 0;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center;
            border-bottom: 2px solid rgba(255,255,255,0.1); z-index: 100;
        }

        #timer { font-size: 42px; font-weight: 900; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        #stars { font-size: 30px; color: var(--star-color); letter-spacing: 10px; margin-top: 5px; }

        #game-area { width: 100%; max-width: 600px; padding: 10px; box-sizing: border-box; }
        .img-container {
            position: relative; width: 100%; border: 3px solid #fff;
            border-radius: 12px; overflow: hidden; margin-bottom: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); line-height: 0;
        }
        .img-container img { width: 100%; height: auto; pointer-events: none; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; z-index: 10; }

        .svg-marker { position: absolute; transform: translate(-50%, -50%); pointer-events: none; z-index: 50; aspect-ratio: 1/1; }
        .draw-circle { stroke: var(--accent-green); stroke-width: 10; stroke-linecap: round; fill: none; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: brush 0.5s ease-out forwards; }
        .draw-cross { stroke: var(--accent-red); stroke-width: 12; stroke-linecap: round; fill: none; stroke-dasharray: 200; stroke-dashoffset: 200; animation: brush 0.3s ease-out forwards; }
        @keyframes brush { to { stroke-dashoffset: 0; } }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .hidden { display: none !important; }
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1001; }

        .btn-main {
            padding: 15px 50px; font-size: 24px; font-weight: bold;
            background: linear-gradient(to bottom, #fbc531, #e1b12c);
            color: #000; border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(251, 197, 49, 0.4); margin-top: 20px; z-index: 1002;
        }

        .code-box {
            background: #2f3640; border: 3px dashed var(--accent-green);
            padding: 20px 40px; font-size: 40px; font-weight: 900;
            color: var(--accent-green); margin: 20px 0; border-radius: 15px;
            animation: pulse 0.8s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .rating-text { 
        font-size: clamp(36px, 8vw, 70px);
        font-weight: 900; 
        color: #fff; 
        text-shadow: 0 0 20px #f1c40f; 
        margin-bottom: 10px;
        text-align: center;
        word-break: break-word;
        line-height: 1.1;
    }
        
        .penalty-fly { 
            position: fixed; color: var(--penalty-yellow); font-size: 24px; font-weight: bold; 
            pointer-events: none; z-index: 200; 
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
            animation: floatUpQuick 1.0s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; 
            display: flex; align-items: center; gap: 6px;
        }
        @keyframes floatUpQuick { 
            0% { transform: translateY(0) scale(0.8); opacity: 0; } 
            15% { transform: translateY(-30px) scale(1.1); opacity: 1; }
            70% { transform: translateY(-50px) scale(1); opacity: 1; }
            100% { transform: translateY(-90px) scale(0.6); opacity: 0; } 
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div id="header">
    <div id="timer">03:00</div>
    <div id="stars">☆☆☆☆☆</div>
</div>

<div id="game-area">
    <div class="img-container" id="cont-1">
        <img id="ref-img" alt="original image">
        <div class="click-layer" onclick="game.check(event, 'cont-1')"></div>
    </div>
    <div class="img-container" id="cont-2">
        <img id="diff-img" alt="modified image">
        <div class="click-layer" onclick="game.check(event, 'cont-2')"></div>
    </div>
</div>

<div id="ui-start" class="overlay">
    <h1 id="start-title" style="font-size: 50px; color: #fbc531; margin-bottom: 5px;" data-i18n="title">喵喵找不同🐾</h1>
    <p id="start-desc" data-i18n="desc">找出5处不同，赢取兑换码！</p>
    <button class="btn-main" onclick="game.init()" data-i18n="startBtn">START GO!</button>
</div>

<div id="ui-win" class="overlay hidden">
    <h2 id="win-title" style="color:#fff; font-size:24px; margin:0;" data-i18n="winTitle">恭喜通关！🎉</h2>
    <div class="rating-text" id="res-rating">-</div>
    <div class="code-box">WINWIN</div>
    <button class="btn-main" onclick="location.reload()" data-i18n="retryBtn">再玩一次</button>
</div>

<div id="ui-fail" class="overlay hidden">
    <h2 id="fail-title" style="font-size: 50px; color: var(--accent-red);" data-i18n="failTitle">重新挑战！</h2>
    <p style="font-size: 60px;">😭</p>
    <button class="btn-main" style="background:#555; color:#fff;" onclick="location.reload()" data-i18n="failBtn">Challenge again!</button>
</div>

            desc: "間違いを5か所見つけて、ギフトコードを獲得しよう！",
            startBtn: "START GO!",
            winTitle: "クリアおめでとうございます！ 🎉",
            retryBtn: "もう一度プレイする",
            failTitle: "タイムアップ！",
            failBtn: "再チャレンジ！"
        }
    };

    function applyLocalization() {
        const userLang = navigator.language || navigator.userLanguage;
        let lang = 'zh'; // 默认简中
        if (userLang.startsWith('ja')) lang = 'ja';
        else if (userLang.includes('TW') || userLang.includes('HK') || userLang.includes('MO')) lang = 'zh-TW';

        const dict = langConfig[lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (dict[key]) el.innerText = dict[key];
        });
    }

    // 页面加载时立即应用本地化和内嵌图片
    applyLocalization();
    applyEmbeddedImages();

    // --- 以下为原有核心玩法代码（保持不变） ---
    const DIFF_DATA = [
        {
                "id": 1,
                "x": 884,
                "y": 136,
                "r": 90
        },
        {
                "id": 2,
                "x": 642,
                "y": 901,
                "r": 90
        },
        {
                "id": 3,
                "x": 1403,
                "y": 466,
                "r": 90
        },
        {
                "id": 4,
                "x": 2194,
                "y": 770,
                "r": 90
        },
        {
                "id": 5,
                "x": 684,
                "y": 571,
                "r": 90
        }
];

    const AudioEngine = {
        ctx: null,
        async init() {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (this.ctx.state === 'suspended') await this.ctx.resume();
        },
        tone(f, t, d, v=0.05, ramp='exp') {
            if (!this.ctx) return;
            const o = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime);
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            if(ramp === 'exp') g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + d);
            else g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + d);
            o.connect(g); g.connect(this.ctx.destination);
            o.start(); o.stop(this.ctx.currentTime + d);
        },
        cheer() {
            const noiseBuf = this.ctx.createBuffer(1, this.ctx.sampleRate * 2, this.ctx.sampleRate);
            const data = noiseBuf.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;

            const playNoise = (freq, vol, dur, delay=0) => {
                setTimeout(() => {
                    const src = this.ctx.createBufferSource();
                    src.buffer = noiseBuf;
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = "bandpass"; filter.frequency.value = freq;
                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0, this.ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
                    src.connect(filter).connect(gain).connect(this.ctx.destination);
                    src.start();
                }, delay);
            };

            playNoise(3500, 0.15, 1.2, 0);
            playNoise(800, 0.2, 1.5, 0);
            playNoise(150, 0.1, 0.8, 0);

            for(let k=0; k<120; k++) {
                const delay = k * (25 + Math.random() * 40);
                if(delay > 2500) break;
                setTimeout(() => {
                    const o = this.ctx.createOscillator();
                    const g = this.ctx.createGain();
                    o.type = 'triangle';
                    o.frequency.setValueAtTime(6000 + Math.random() * 2000, this.ctx.currentTime);
                    g.gain.setValueAtTime(0.06, this.ctx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.08);
                    o.connect(g).connect(this.ctx.destination);
                    o.start(); o.stop(this.ctx.currentTime + 0.08);
                }, delay);
            }
        },
        startBGM() {
            const melody = [523, 659, 783, 1046, 880, 698, 783, 659];
            let i = 0;
            this.bgmInt = setInterval(() => {
                if(game.active) { this.tone(melody[i % melody.length], 'sine', 0.3, 0.045); i++; }
            }, 300);
        },
        correct() { this.tone(880, 'sine', 0.2, 0.1); setTimeout(()=>this.tone(1320, 'sine', 0.3, 0.1), 80); },
        wrong() { this.tone(120, 'sawtooth', 0.5, 0.15); },
        cry() {
            this.tone(300, 'sine', 2.5, 0.2, 'linear');
            const o = this.ctx.createOscillator();
            o.frequency.setValueAtTime(300, this.ctx.currentTime);
            o.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 2.5);
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(0.2, this.ctx.currentTime);
            g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2.5);
            o.connect(g).connect(this.ctx.destination);
            o.start(); o.stop(this.ctx.currentTime + 2.5);
        },
        speechReady: false,
        speechPrimeDone: false,
        speechTimer: null,
        setupSpeech() {
            if (!('speechSynthesis' in window)) return;
            const loadVoices = () => {
                try { window.speechSynthesis.getVoices(); } catch (e) {}
                this.speechReady = true;
            };
            loadVoices();
            if ('onvoiceschanged' in window.speechSynthesis) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        },
        primeSpeech() {
            if (!('speechSynthesis' in window) || this.speechPrimeDone) return;
            this.speechPrimeDone = true;
            try {
                const warm = new SpeechSynthesisUtterance(' ');
                warm.lang = 'en-US';
                warm.volume = 0;
                warm.rate = 1;
                warm.pitch = 1;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(warm);
            } catch (e) {}
        },
        getAnnouncementVoice() {
            if (!('speechSynthesis' in window)) return null;
            try {
                const voices = window.speechSynthesis.getVoices() || [];
                return (
                    voices.find(v => /^en[-_]/i.test(v.lang) && /female|samantha|zira|aria|ava|google us english/i.test(v.name)) ||
                    voices.find(v => /^en[-_]/i.test(v.lang)) ||
                    null
                );
            } catch (e) {
                return null;
            }
        },
        announce(level) {
    try{window.__SFX__ && window.__SFX__.play(level);}catch(e){}
            if (!('speechSynthesis' in window)) return;
            const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
            const ratings = [
                { text: "Great!", pitch: isMobile ? 1.02 : 1.05, rate: isMobile ? 0.92 : 0.98 },
                { text: "Excellent!", pitch: isMobile ? 1.05 : 1.1, rate: isMobile ? 0.96 : 1.02 },
                { text: "Wow! Amazing!", pitch: isMobile ? 1.08 : 1.15, rate: isMobile ? 1.0 : 1.06 },
                { text: "Oh my god! Unbelievable!", pitch: isMobile ? 1.12 : 1.2, rate: isMobile ? 1.04 : 1.1 }
            ];
            const r = ratings[level] || ratings[0];
            const msg = new SpeechSynthesisUtterance(r.text);
            msg.lang = 'en-US';
            msg.pitch = r.pitch;
            msg.rate = r.rate;
            msg.volume = 0.95;
            const voice = this.getAnnouncementVoice();
            if (voice) msg.voice = voice;

            try {
                window.speechSynthesis.cancel();
                clearTimeout(this.speechTimer);
                this.speechTimer = setTimeout(() => {
                    try { window.speechSynthesis.speak(msg); } catch (e) {}
                }, 120);
            } catch (e) {}
        }
    };

    const Confetti = {
        canvas: null, ctx: null, particles: [],
        init() {
            this.canvas = document.getElementById('confetti-canvas');
            this.ctx = this.canvas.getContext('2d');
            this.canvas.width = window.innerWidth;
            this.canvas.height = window.innerHeight;
        },
        burst() {
            for(let i=0; i<400; i++) {
                this.particles.push({
                    x: window.innerWidth/2, y: window.innerHeight/2,
                    v: { x: (Math.random()-0.5)*25, y: (Math.random()-0.5)*30 - 15 },
                    r: Math.random()*8 + 4,
                    color: `hsl(${Math.random()*360}, 100%, 50%)`,
                    life: 2.5
                });
            }
            this.animate();
        },
        animate() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            this.particles.forEach((p, i) => {
                p.v.y += 0.42; p.x += p.v.x; p.y += p.v.y; p.life -= 0.008;
                this.ctx.fillStyle = p.color; this.ctx.globalAlpha = p.life;
                this.ctx.fillRect(p.x, p.y, p.r, p.r);
                if(p.life <= 0) this.particles.splice(i, 1);
            });
            if(this.particles.length > 0) requestAnimationFrame(() => this.animate());
        }
    };

    const game = {
        time: 180, found: [], active: false,
        async init() {
            await AudioEngine.init(); Confetti.init();
            document.getElementById('ui-start').classList.add('hidden');
            this.active = true; AudioEngine.startBGM();
            this.timer = setInterval(() => {
                this.time--; this.updateUI();
                if(this.time <= 0) this.end(false);
            }, 1000);
        },
        updateUI() {
            const m = Math.floor(Math.max(0, this.time)/60).toString().padStart(2,'0');
            const s = (Math.max(0, this.time)%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            document.getElementById('stars').innerText = '★'.repeat(this.found.length) + '☆'.repeat(5-this.found.length);
        },
        check(e, cid) {
            if(!this.active) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const img = document.getElementById('ref-img');
            const cx = (e.clientX - rect.left) * (img.naturalWidth / rect.width);
            const cy = (e.clientY - rect.top) * (img.naturalHeight / rect.height);
            const hit = DIFF_DATA.find(d => !this.found.includes(d.id) && Math.hypot(d.x - cx, d.y - cy) < d.r);
            if(hit) this.doCorrect(hit, (hit.x/img.naturalWidth)*100, (hit.y/img.naturalHeight)*100);
            else this.doWrong(e.clientX, e.clientY, e.currentTarget);
        },
        doCorrect(hit, px, py) {
            this.found.push(hit.id); AudioEngine.correct(); this.updateUI();
            ['cont-1', 'cont-2'].forEach(id => {
                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("viewBox", "0 0 100 100"); svg.classList.add("svg-marker");
                svg.style.width="14%"; svg.style.left=px+"%"; svg.style.top=py+"%";
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", "M50,10 C75,10 90,30 90,50 C90,75 70,90 50,90 C30,90 10,70 10,50 C10,25 35,10 55,12");
                p.classList.add("draw-circle"); svg.appendChild(p);
                document.getElementById(id).appendChild(svg);
            });
            if(this.found.length === 5) this.end(true);
        },
        doWrong(cx, cy, target) {
            this.time -= 20; AudioEngine.wrong(); this.updateUI();
            const rect = target.getBoundingClientRect();
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 100 100"); svg.classList.add("svg-marker");
            svg.style.width = "12%"; svg.style.left = ((cx-rect.left)/rect.width)*100 + "%"; svg.style.top = ((cy-rect.top)/rect.height)*100 + "%";
            const p1 = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p1.setAttribute("d", "M20,20 L80,80"); p1.classList.add("draw-cross");
            const p2 = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p2.setAttribute("d", "M80,20 L20,80"); p2.classList.add("draw-cross");
            svg.appendChild(p1); svg.appendChild(p2); target.appendChild(svg);

            const f = document.createElement('div'); f.className = 'penalty-fly'; 
            f.innerHTML = '<span>⏰</span> -20s';
            f.style.left = cx + 'px'; f.style.top = (cy - 10) + 'px';
            document.body.appendChild(f);

            setTimeout(() => { svg.remove(); f.remove(); }, 1000); 
        },
        end(win) {
            this.active = false; clearInterval(this.timer);
            if(win) {
                let level = 0;
                if(this.time >= 150) level = 3;
                else if(this.time >= 91) level = 2;
                else if(this.time >= 31) level = 1;
                const ratings = ["Great!", "Excellent!", "Amazing!", "Unbelievable!"];
                document.getElementById('res-rating').innerText = ratings[level];
                document.getElementById('ui-win').classList.remove('hidden');
                AudioEngine.cheer(); 
                setTimeout(() => AudioEngine.announce(level), 300);
                Confetti.burst();
            } else {
                AudioEngine.cry();
                document.getElementById('ui-fail').classList.remove('hidden');
            }
        }
    };

window.__SFX__ = {
    ctx: null,
    play(level){
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if(!Ctx) return;
        if(!this.ctx) this.ctx = new Ctx();
        const ctx = this.ctx;
        if(ctx.state === 'suspended'){ try{ctx.resume()}catch(e){} }

        const tones = [660,880,1170,1560];
        const count = Math.min(level+1, tones.length);

        const now = ctx.currentTime;
        for(let i=0;i<count;i++){
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.frequency.value = tones[i];
            gain.gain.value = 0.05;

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start(now + i*0.08);
            osc.stop(now + i*0.08 + 0.12);
        }
    }
};

</script>
